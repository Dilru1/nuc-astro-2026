# Book metadata
title: Nuclear Astrophysics 2026
author: Your Name/Course Instructor
logo: logo.png

# Execution settings
execute:
  execute_notebooks: force  # Ensures all notebooks are run during the build
  timeout: 60              # Optional: increase if calculations take time

# Citations and Bibliography
# Ensure 'references.bib' is in your nuc-astro-cmb/ folder
bibtex_bibfiles:
  - references.bib

# Required for parsing citations and markdown features
parse:
  myst_enable_extensions:
    - amsmath
    - colon_fence
    - dollarmath
    - linkify
    - substitution
    - tasklist

# HTML output settings
html:
  use_edit_page_button: true
  use_repository_button: true
  use_issues_button: true
  repository_url: https://github.com/Dilru1/nuc-astro-2026
  repository_branch: main
  path_to_book: nuc-astro-cmb  # Important for navigating back to your subfolder