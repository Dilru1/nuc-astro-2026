name: Deploy Book

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install jupyter-book
          if [ -f nuc-astro-cmb/requirements.txt ]; then pip install -r nuc-astro-cmb/requirements.txt; fi

      - name: Build the book
        run: jupyter-book build nuc-astro-cmb

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./nuc-astro-cmb/_build/html