name: deploy-book

on:
  push:
    branches:
      - main  # Or master, depending on your branch name
    paths:
      - 'nuc-astro-cmb/**'  # Only run when files in this folder change

jobs:
  deploy-book:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install jupyter-book

      - name: Build the book
        run: |
          # Build the book specifically from the subdirectory
          jupyter-book build nuc-astro-cmb/

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload the built HTML files from the subdirectory
          path: nuc-astro-cmb/_build/html

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4